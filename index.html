<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS · Day-Works & VoR Tracker</title>
  <link rel="icon" href="https://justingps.github.io/dpr/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    :root {
      --font:'DM Sans',system-ui,sans-serif;
      --mono:'DM Mono',monospace;
      --accent:#E07B39;--accent-h:#C96929;--accent-l:rgba(224,123,57,0.1);
      --blue:#3B82F6;--blue-l:rgba(59,130,246,0.1);
      --green:#10B981;--green-l:rgba(16,185,129,0.1);
      --red:#EF4444;--red-l:rgba(239,68,68,0.1);
      --amber:#F59E0B;--amber-l:rgba(245,158,11,0.1);
      --purple:#8B5CF6;--purple-l:rgba(139,92,246,0.1);
      --radius:8px;--radius-lg:12px;--radius-xl:16px;
      --topbar-h:58px;
      --transition:0.18s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"]{
      --bg:#0C0E14;--bg2:#11141C;--surface:#161B27;--surface2:#1D2436;--surface3:#232D42;
      --border:rgba(255,255,255,0.06);--border-br:rgba(255,255,255,0.1);--border-focus:rgba(224,123,57,0.5);
      --text:#E8EDF5;--text-sub:#8494AF;--text-dim:#3D4D66;
      --shadow:0 8px 32px rgba(0,0,0,0.6);--shadow-sm:0 2px 8px rgba(0,0,0,0.4);
      --input-bg:#1D2436;--scroll-thumb:#2C3A55;
      --modal-bg:rgba(0,0,0,0.75);
      --topbar-bg:rgba(12,14,20,0.95);
      --tag-eng-bg:rgba(59,130,246,0.12);--tag-eng-br:rgba(59,130,246,0.25);--tag-eng-text:#7AB3FA;
      --tag-qs-bg:rgba(16,185,129,0.12);--tag-qs-br:rgba(16,185,129,0.25);--tag-qs-text:#34D399;
    }

    [data-theme="light"]{
      --bg:#F3F5F8;--bg2:#EAECF1;--surface:#FFFFFF;--surface2:#F7F8FB;--surface3:#EEF0F5;
      --border:rgba(0,0,0,0.06);--border-br:rgba(0,0,0,0.1);--border-focus:rgba(224,123,57,0.4);
      --text:#111827;--text-sub:#6B7280;--text-dim:#9CA3AF;
      --shadow:0 4px 24px rgba(0,0,0,0.08);--shadow-sm:0 2px 8px rgba(0,0,0,0.06);
      --input-bg:#F3F5F8;--scroll-thumb:#D1D5DB;
      --modal-bg:rgba(0,0,0,0.45);
      --topbar-bg:rgba(255,255,255,0.97);
      --tag-eng-bg:rgba(59,130,246,0.08);--tag-eng-br:rgba(59,130,246,0.2);--tag-eng-text:#2563EB;
      --tag-qs-bg:rgba(16,185,129,0.08);--tag-qs-br:rgba(16,185,129,0.2);--tag-qs-text:#059669;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;
      transition:background var(--transition),color var(--transition);
      -webkit-font-smoothing:antialiased;
    }

    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:10px}
    ::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}

    /* ===== LOGIN ===== */
    #login-screen {
      position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
      background:var(--bg);
    }
    .login-dots {
      position:absolute;inset:0;pointer-events:none;
      background-image:radial-gradient(var(--border-br) 1px,transparent 1px);
      background-size:28px 28px;
      mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 0%,transparent 100%);
    }
    .login-card {
      position:relative;z-index:1;width:420px;
      background:var(--surface);border:1px solid var(--border-br);border-radius:var(--radius-xl);
      padding:44px 40px;box-shadow:var(--shadow);
      animation:fadeUp 0.4s ease;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}

    .login-brand {
      display:flex;align-items:center;gap:14px;margin-bottom:32px;
      padding-bottom:20px;border-bottom:1px solid var(--border);
    }
    .login-brand img{width:42px;height:42px;border-radius:10px;object-fit:contain;background:var(--surface2);padding:6px;border:1px solid var(--border-br)}
    .login-brand-name{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;line-height:1.2;}
    .login-brand-sub{font-size:0.65rem;color:var(--text-sub);letter-spacing:0.12em;text-transform:uppercase;font-weight:500;margin-top:2px;}
    .login-heading{font-size:1.6rem;font-weight:700;margin-bottom:5px;letter-spacing:-0.02em;}
    .login-sub{font-size:0.875rem;color:var(--text-sub);margin-bottom:28px;}
    .field-wrap{margin-bottom:16px}
    .field-label{display:block;font-size:0.7rem;font-weight:600;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:7px;}
    .field-inner{position:relative}
    .field-inner i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:0.85rem;pointer-events:none;}
    .field-inner input{width:100%;padding:11px 13px 11px 38px;background:var(--input-bg);border:1.5px solid var(--border-br);border-radius:var(--radius);color:var(--text);outline:none;font-family:var(--font);font-size:0.9rem;transition:border-color var(--transition),box-shadow var(--transition);}
    .field-inner input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(224,123,57,0.12)}
    .btn-login{width:100%;padding:12px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-weight:600;text-transform:uppercase;cursor:pointer;font-family:var(--font);font-size:0.85rem;letter-spacing:0.06em;transition:all var(--transition);}
    .btn-login:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 12px rgba(224,123,57,0.3);}
    .btn-login:active{transform:none;}
    .login-error{display:none;align-items:center;gap:8px;color:var(--red);margin-top:12px;padding:10px 14px;background:var(--red-l);border-radius:var(--radius);font-size:0.85rem;font-weight:500;border:1px solid rgba(239,68,68,0.2);}
    .login-theme-toggle{position:absolute;top:18px;right:18px}
    .login-footer{margin-top:28px;font-size:0.7rem;color:var(--text-dim);text-align:center;}

    /* ===== THEME TOGGLE ===== */
    .theme-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border-br);border-radius:40px;padding:3px;gap:2px;}
    .theme-opt{padding:5px 12px;border-radius:30px;font-size:0.72rem;font-weight:600;color:var(--text-sub);display:flex;align-items:center;gap:5px;transition:all var(--transition);cursor:pointer;user-select:none;}
    .theme-opt.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);}
    .theme-opt i{font-size:0.7rem;}

    /* ===== TOPBAR ===== */
    #dashboard{display:none;flex-direction:column;min-height:100vh}
    .topbar {
      position:sticky;top:0;z-index:80;display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;height:var(--topbar-h);background:var(--topbar-bg);
      border-bottom:1px solid var(--border);backdrop-filter:blur(20px);
    }
    .topbar-left{display:flex;align-items:center;gap:12px}
    .topbar-logo{width:34px;height:34px;border-radius:8px;object-fit:contain;background:var(--surface2);padding:5px;border:1px solid var(--border-br);}
    .topbar-name{font-size:1rem;font-weight:700;letter-spacing:-0.02em;}
    .topbar-meta{font-size:0.6rem;color:var(--text-sub);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-top:1px;}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .topbar-date{font-size:0.75rem;color:var(--text-sub);padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-weight:500;}
    .btn-icon-topbar{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:var(--radius);border:1px solid var(--border-br);background:transparent;cursor:pointer;color:var(--text-sub);font-size:0.9rem;transition:all var(--transition);}
    .btn-icon-topbar:hover{background:var(--surface2);color:var(--text)}
    .btn-logout{display:flex;align-items:center;gap:6px;padding:6px 14px;background:transparent;border:1px solid var(--border-br);border-radius:20px;color:var(--text-sub);cursor:pointer;font-weight:500;font-size:0.78rem;font-family:var(--font);transition:all var(--transition);}
    .btn-logout:hover{background:var(--red-l);border-color:rgba(239,68,68,0.3);color:var(--red)}

    /* ===== CONTENT (FLUID LAYOUT) ===== */
    .content {
      padding:24px;
      width:100%;
      max-width:100%;
      margin:0;
      animation:fadeIn 0.3s ease;
    }
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:1.6rem;font-weight:700;letter-spacing:-0.025em;line-height:1.2;}
    .page-title span{color:var(--accent)}
    .page-subtitle{font-size:0.8rem;color:var(--text-sub);margin-top:4px;font-weight:400;}
    .page-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

    /* ===== BUTTONS ===== */
    .btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius);font-weight:600;cursor:pointer;font-family:var(--font);font-size:0.8rem;border:none;transition:all var(--transition);}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 12px rgba(224,123,57,0.25);}
    .btn-primary:active{transform:none;}
    .btn-ghost{background:transparent;color:var(--text-sub);border:1px solid var(--border-br);}
    .btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border-br);}
    .btn-excel{background:var(--green-l);color:var(--green);border:1px solid rgba(16,185,129,0.2);}
    .btn-excel:hover{background:rgba(16,185,129,0.15);}
    .btn-refresh{background:var(--blue-l);color:var(--blue);border:1px solid rgba(59,130,246,0.2);}
    .btn-refresh:hover{background:rgba(59,130,246,0.15);}
    .btn i{font-size:0.78rem;}

    /* ===== TABS ===== */
    .view-tabs {
      display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);
      border-radius:var(--radius);padding:3px;margin-bottom:20px;width:fit-content;
    }
    .view-tab {
      padding:6px 16px;border-radius:6px;font-size:0.78rem;font-weight:600;
      color:var(--text-sub);cursor:pointer;transition:all var(--transition);
      display:flex;align-items:center;gap:6px;
    }
    .view-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm);}
    .view-tab:hover:not(.active){color:var(--text);}
    .view-tab i{font-size:0.72rem;}

    /* ===== FILTERS ===== */
    .filters-wrap {
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:14px 18px;margin-bottom:16px;
    }
    .filters-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
    .filter-group{display:flex;align-items:center;gap:8px;flex:1;min-width:160px;}
    .filter-label{font-size:0.68rem;font-weight:600;color:var(--text-sub);white-space:nowrap;text-transform:uppercase;letter-spacing:0.06em;}
    .f-input{flex:1;padding:7px 11px;background:var(--input-bg);border:1px solid var(--border-br);border-radius:var(--radius);color:var(--text);outline:none;font-family:var(--font);font-size:0.82rem;}
    select.f-input{cursor:pointer}
    .f-input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(224,123,57,0.1)}
    .filter-clear{display:none;align-items:center;gap:5px;padding:6px 11px;border-radius:var(--radius);background:var(--accent-l);color:var(--accent);font-size:0.75rem;font-weight:600;cursor:pointer;border:1px solid rgba(224,123,57,0.2);white-space:nowrap;transition:all var(--transition);}
    .filter-clear:hover{background:rgba(224,123,57,0.15);}
    .filter-clear.visible{display:flex;}

    /* ===== KPI STATS ===== */
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
    @media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
    .kpi-card {
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:14px 16px;cursor:pointer;transition:all var(--transition);
      position:relative;overflow:hidden;
    }
    .kpi-card::before{
      content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
      border-radius:0 2px 2px 0;opacity:0;transition:opacity var(--transition);
    }
    .kpi-card:hover{border-color:var(--border-br);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
    .kpi-card.active{border-color:var(--border-br);box-shadow:var(--shadow-sm);}
    .kpi-card.active::before{opacity:1;}
    .kpi-card.kpi-total::before{background:var(--accent);}
    .kpi-card.kpi-approved::before{background:var(--green);}
    .kpi-card.kpi-rejected::before{background:var(--red);}
    .kpi-card.kpi-pending-qs::before{background:var(--blue);}
    .kpi-card.kpi-pending-ap::before{background:var(--amber);}
    .kpi-card.active .kpi-value{color:var(--accent);}
    .kpi-card.kpi-approved.active .kpi-value{color:var(--green);}
    .kpi-card.kpi-rejected.active .kpi-value{color:var(--red);}
    .kpi-card.kpi-pending-qs.active .kpi-value{color:var(--blue);}
    .kpi-card.kpi-pending-ap.active .kpi-value{color:var(--amber);}
    .kpi-icon{font-size:0.9rem;margin-bottom:10px;}
    .kpi-icon.orange{color:var(--accent);}
    .kpi-icon.green{color:var(--green);}
    .kpi-icon.red{color:var(--red);}
    .kpi-icon.blue{color:var(--blue);}
    .kpi-icon.amber{color:var(--amber);}
    .kpi-value{font-size:1.8rem;font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:4px;transition:color var(--transition);}
    .kpi-label{font-size:0.68rem;font-weight:600;color:var(--text-sub);text-transform:uppercase;letter-spacing:0.06em;}
    .kpi-trend{font-size:0.68rem;color:var(--text-dim);margin-top:4px;font-weight:400;}

    /* ===== LEGEND ===== */
    .legend-row {
      display:flex;align-items:center;gap:20px;margin-bottom:14px;
      padding:10px 14px;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);flex-wrap:wrap;
    }
    .legend-item{display:flex;align-items:center;gap:7px;font-size:0.75rem;font-weight:500;color:var(--text-sub);}
    .legend-dot{width:8px;height:8px;border-radius:50%;}
    .legend-dot.eng{background:var(--blue);}
    .legend-dot.qs{background:var(--green);}
    .legend-sep{width:1px;height:16px;background:var(--border-br);}

    /* ===== TABLE (FLUID + WRAPPING) ===== */
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;width:100%;}
    .table-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
    .table-title{font-size:0.95rem;font-weight:700;letter-spacing:-0.01em;}
    .table-meta{display:flex;align-items:center;gap:10px;}
    .record-count{font-size:0.72rem;font-weight:600;color:var(--accent);background:var(--accent-l);padding:3px 10px;border-radius:20px;border:1px solid rgba(224,123,57,0.18);}
    .col-toggle-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border-br);background:transparent;color:var(--text-sub);font-size:0.72rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all var(--transition);}
    .col-toggle-btn:hover{background:var(--surface2);color:var(--text);}
    .table-scroll{overflow-x:auto;width:100%;}
    .data-table{width:100%;border-collapse:collapse;table-layout:auto;}
    .data-table th {
      position:sticky;top:0;z-index:10;padding:10px 14px;font-size:0.65rem;font-weight:600;
      color:var(--text-sub);text-transform:uppercase;letter-spacing:0.06em;
      background:var(--surface2);border-bottom:1px solid var(--border-br);text-align:left;
      white-space:nowrap;cursor:default;user-select:none;
    }
    .data-table th.sortable{cursor:pointer;}
    .data-table th.sortable:hover{color:var(--text);}
    .th-eng{background:var(--tag-eng-bg)!important;color:var(--tag-eng-text)!important;border-bottom:2px solid rgba(59,130,246,0.3)!important;}
    .th-qs{background:var(--tag-qs-bg)!important;color:var(--tag-qs-text)!important;border-bottom:2px solid rgba(16,185,129,0.3)!important;}
    .sort-icon{margin-left:5px;font-size:0.6rem;opacity:0.4;}
    .sort-icon.asc{opacity:1;color:var(--accent);}
    .sort-icon.desc{opacity:1;color:var(--accent);}
    .data-table td{
      padding:10px 14px;font-size:0.82rem;color:var(--text);
      border-bottom:1px solid var(--border);transition:background var(--transition);
      vertical-align:top;
    }
    .data-table tbody tr:hover td{background:var(--surface2);}
    .data-table tbody tr:last-child td{border-bottom:none;}
    /* Multi-line wrapping ONLY for Work Scope and Remarks columns */
    .col-scope, .col-remarks {
      white-space: normal !important;
      word-break: break-word;
      min-width: 180px;
      max-width: 320px;
      line-height: 1.5;
    }
    /* All other columns stay single-line */
    .data-table td:not(.col-scope):not(.col-remarks) {
      white-space: nowrap;
    }

    /* Row state colors */
    .row-approved td{background:rgba(16,185,129,0.04)!important;}
    .row-rejected td{background:rgba(239,68,68,0.04)!important;}
    .row-pending td{background:rgba(245,158,11,0.04)!important;}
    [data-theme="dark"] .row-approved td{background:rgba(16,185,129,0.08)!important;}
    [data-theme="dark"] .row-rejected td{background:rgba(239,68,68,0.08)!important;}
    [data-theme="dark"] .row-pending td{background:rgba(245,158,11,0.06)!important;}
    .row-approved:hover td,.row-rejected:hover td,.row-pending:hover td{filter:brightness(1.04);}

    /* ===== BADGES ===== */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:0.68rem;font-weight:600;letter-spacing:0.02em;border:1px solid transparent;white-space:nowrap;}
    .badge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
    .badge-approved{background:var(--green-l);color:var(--green);border-color:rgba(16,185,129,0.2);}
    .badge-approved .badge-dot{background:var(--green);}
    .badge-pending{background:var(--amber-l);color:var(--amber);border-color:rgba(245,158,11,0.2);}
    .badge-pending .badge-dot{background:var(--amber);}
    .badge-rejected{background:var(--red-l);color:var(--red);border-color:rgba(239,68,68,0.2);}
    .badge-rejected .badge-dot{background:var(--red);}
    .badge-vor{background:var(--purple-l);color:var(--purple);border-color:rgba(139,92,246,0.2);}
    .badge-daywork{background:var(--blue-l);color:var(--blue);border-color:rgba(59,130,246,0.2);}
    .badge-site{background:var(--surface2);color:var(--text-sub);border-color:var(--border-br);}
    .badge-disc{background:var(--surface2);color:var(--text-sub);border-color:var(--border-br);}

    /* Row number */
    .row-num{font-family:var(--mono);font-size:0.7rem;font-weight:500;color:var(--text-dim);}
    .mono{font-family:var(--mono);font-size:0.78rem;}

    /* ===== CELL ACTIONS ===== */
    .cell-actions{display:flex;gap:4px;justify-content:center;}
    .icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;color:var(--text-dim);font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
    .icon-btn:hover{color:var(--text);background:var(--surface2);border-color:var(--border-br);}
    .icon-btn.edit:hover{color:var(--blue);border-color:rgba(59,130,246,0.3);background:var(--blue-l);}

    .spinner{width:28px;height:28px;border:2.5px solid var(--border-br);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===== TOAST ===== */
    #app-toasts{position:fixed;bottom:22px;right:22px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast{
      background:var(--surface);border:1px solid var(--border-br);
      padding:12px 16px;border-radius:var(--radius);box-shadow:var(--shadow);
      font-weight:500;font-size:0.82rem;display:flex;align-items:center;gap:10px;
      animation:toastIn 0.3s ease;pointer-events:auto;min-width:220px;
      transition:opacity 0.3s,transform 0.3s;
    }
    .toast.out{opacity:0;transform:translateX(20px);}
    .toast-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.72rem;flex-shrink:0;}
    .toast.success .toast-icon{background:var(--green-l);color:var(--green);}
    .toast.error .toast-icon{background:var(--red-l);color:var(--red);}
    .toast.info .toast-icon{background:var(--blue-l);color:var(--blue);}
    @keyframes toastIn{from{transform:translateX(32px);opacity:0}to{transform:none;opacity:1}}

    .modal-overlay, .confirm-overlay, .detail-overlay, .detail-panel, .kanban-view { /* existing styles kept intact */ }

    .form-section{margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}

    .form-section-header.eng{background:var(--tag-eng-bg);color:var(--tag-eng-text);}
